<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <nav>
        <span style= "font-size: large; font-weight: 700;">My Shop</span>

        <a class="nav-link" href="#">Home</a>
        <a class="nav-link" href="#">Products</a>
    </nav>
    <main>
        <div class="card">
            <h2>Catalizator BMW</h2>
            <button class = "btn">Add to Cart</button>
        </div>
    </main>
    <style> 
        .nav-link{
            color: black;
            text-decoration: none;
            padding: 0 10px;
            margin: 0 5px;
        } 
        .card{
            border: 2px solid gray;
            max-width: 200px;
            border-radius: 10px;
            padding: 10px;
            text-align: center;
        }   
        .btn{
            background-color: blue;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
        }
        .btn:hover{
            background-color: darkblue;
            transition: 0.3s all;
            transition: background-color 0.3s;
            transform: scale(1.1);
        }
    </style>
</body>
</html>
