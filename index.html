<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <nav>
        Navbar
    </nav>

    <main>
        Main content
        <i>Italic</i>
        <b>Bold</b>
        <strong>Strong</strong>
        <sub>Subscript</sub>
        <sup>Superscript</sup>
        <ol>
            <li>Item 1</li>
            <li>Item 2</li>
        </ol>
        <ul>
            <li>Item A</li>
            <li>Item B</li>
    </main>


<!-- 
    -name
    -email
    -password
    -data nasterii
    -telefon
    -acceptare termeni si conditii
    -submit
-->
    <form>  
        <label for="name">Name:</label>
        <input type="text" id="name" name="name" placeholder="Ion"><br><br>

        <label for="email">Email:</label>
        <input type="email" id="email" name="email" placeholder="ion@example.com"><br><br>

        <label for="password">Password:</label>
        <input type="password" id="password" name="password" placeholder="Enter your password"><br><br>

        <label for="dob">Date of Birth:</label>
        <input type="date" id="dob" name="dob"><br><br>

        <label for="phone">Phone:</label>
        <input type="tel" id="phone" name="phone" placeholder="+40 7x xxx xxx"><br><br>

        <input type="checkbox" id="terms" name="terms" required>
        <label for="terms">I accept the terms and conditions</label><br><br>

        <input type="submit" value="Submit">
    </form>

    <article>
        Article
    </article>

    <section>
        Section
    </section>

    <footer>
        Footer
    </footer>
</body>
</html>
